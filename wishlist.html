<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Wishlist | Ruma's Sajghor</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Wishlist Page Styles ── */
    .wl-page {
      min-height: 100vh;
      padding-top: calc(var(--nav-height) + 3rem);
      padding-bottom: 5rem;
      background: var(--clr-blush-lt);
    }

    .wl-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Hero banner */
    .wl-hero {
      text-align: center;
      margin-bottom: 3rem;
      padding: 2.5rem 1.5rem;
      background: var(--clr-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }

    .wl-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(247,200,208,0.3) 0%, transparent 60%);
      pointer-events: none;
    }

    .wl-hero-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .wl-hero h1 {
      font-family: var(--ff-display);
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--clr-maroon);
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .wl-hero p {
      color: var(--clr-text-lt);
      font-size: var(--fs-sm);
    }

    /* Count bar */
    .wl-count-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding: 0 0.25rem;
    }

    .wl-count-label {
      font-size: var(--fs-sm);
      color: var(--clr-text-lt);
      font-family: var(--ff-body);
    }

    .wl-clear-btn {
      font-size: var(--fs-xs);
      color: var(--clr-text-lt);
      background: none;
      border: 1px solid var(--clr-grey);
      border-radius: var(--radius-sm);
      padding: 0.35rem 0.9rem;
      cursor: pointer;
      font-family: var(--ff-body);
      transition: all 0.2s;
    }
    .wl-clear-btn:hover { border-color: var(--clr-maroon); color: var(--clr-maroon); }

    /* Count bar action group */
    .wl-actions-group {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .wl-share-all-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: var(--fs-xs);
      color: var(--clr-maroon);
      background: none;
      border: 1px solid var(--clr-maroon);
      border-radius: var(--radius-sm);
      padding: 0.35rem 0.9rem;
      cursor: pointer;
      font-family: var(--ff-body);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .wl-share-all-btn:hover {
      background: var(--clr-maroon);
      color: var(--clr-white);
    }

    /* Grid */
    .wl-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
    }

    /* Card */
    .wl-card {
      background: var(--clr-white);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition), transform var(--transition);
      position: relative;
    }
    .wl-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-4px);
    }

    .wl-card-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      background: var(--clr-grey-lt);
    }

    .wl-card-body {
      padding: 1rem 1.1rem 1.25rem;
    }

    .wl-card-name {
      font-family: var(--ff-display);
      font-size: var(--fs-lg);
      color: var(--clr-text);
      font-weight: 500;
      margin-bottom: 0.2rem;
      line-height: 1.3;
    }

    .wl-card-price {
      font-size: var(--fs-md);
      color: var(--clr-maroon);
      font-weight: 500;
      margin-bottom: 0.9rem;
    }

    .wl-remove-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.92);
      color: var(--clr-maroon);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: background 0.2s, transform 0.15s;
    }
    .wl-remove-btn:hover { background: var(--clr-blush); transform: scale(1.1); }

    .wl-share-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.92);
      color: var(--clr-maroon);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: background 0.2s, transform 0.15s;
    }
    .wl-share-btn:hover { background: var(--clr-blush); transform: scale(1.1); }

    /* Toast for copy feedback */
    .wl-toast {
      position: fixed;
      bottom: 1.75rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--clr-maroon);
      color: var(--clr-white);
      font-family: var(--ff-body);
      font-size: var(--fs-sm);
      letter-spacing: 0.04em;
      padding: 0.7rem 1.5rem;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 999;
      white-space: nowrap;
    }
    .wl-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Empty state */
    .wl-empty {
      text-align: center;
      padding: 5rem 1.5rem;
      background: var(--clr-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }
    .wl-empty-icon { font-size: 4rem; margin-bottom: 1rem; display: block; opacity: 0.4; }
    .wl-empty h2 {
      font-family: var(--ff-display);
      font-size: var(--fs-2xl);
      color: var(--clr-maroon);
      margin-bottom: 0.75rem;
    }
    .wl-empty p { color: var(--clr-text-lt); margin-bottom: 2rem; }

    /* Alpana divider */
    .wl-divider {
      text-align: center;
      margin: 0.5rem 0 2.5rem;
      opacity: 0.5;
    }

    @media (max-width: 600px) {
      .wl-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
      .wl-page { padding-top: calc(var(--nav-height) + 2rem); }
      .wl-count-bar { flex-wrap: wrap; gap: 0.75rem; }
      .wl-actions-group { margin-left: auto; }
    }
    @media (max-width: 420px) {
      .wl-grid { grid-template-columns: 1fr; }
      .wl-count-bar { flex-direction: column; align-items: flex-start; }
      .wl-actions-group { margin-left: 0; width: 100%; }
      .wl-share-all-btn, .wl-clear-btn { flex: 1 1 0; justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- ========== NAVBAR ========== -->
  <header class="navbar" id="navbar" role="banner">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" aria-label="Ruma's Sajghor Home">
        <img src="logo.png" alt="Ruma's Sajghor Logo" class="logo-img" />
        <div class="nav-brand-text">
          <span class="nav-brand-name">Ruma's Sajghor</span>
          <span class="nav-brand-tagline">Dress Your Story</span>
        </div>
      </a>

      <nav class="nav-links" id="navLinks" role="navigation" aria-label="Main navigation">
        <a href="index.html#home"        class="nav-link">Home</a>
        <a href="index.html#collections" class="nav-link">Collections</a>
        <a href="index.html#about"       class="nav-link">About</a>
        <a href="index.html#contact"     class="nav-link">Contact</a>
      </nav>

      <button class="nav-wishlist-icon" aria-label="My Wishlist (current page)" style="color:var(--clr-maroon)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="wishlist-count" id="wishlistCount" hidden>0</span>
      </button>

      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false" aria-controls="navLinks">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ========== WISHLIST PAGE ========== -->
  <main class="wl-page" id="wishlistPage">
    <div class="wl-inner">

      <!-- Hero banner -->
      <div class="wl-hero">
        <span class="wl-hero-icon">♡</span>
        <h1>My Wishlist</h1>
        <p>Items you've saved — ready whenever you are.</p>
      </div>

      <!-- Alpana divider -->
      <div class="wl-divider" aria-hidden="true">
        <svg viewBox="0 0 600 20" xmlns="http://www.w3.org/2000/svg" width="300" height="20">
          <line x1="0" y1="10" x2="230" y2="10" stroke="#F7C8D0" stroke-width="1"/>
          <circle cx="245" cy="10" r="3" fill="#7B1E3A" opacity="0.4"/>
          <path d="M255,10 Q265,4 275,10 Q285,16 295,10 Q305,4 315,10 Q325,16 335,10 Q345,4 355,10" stroke="#7B1E3A" stroke-width="1.2" fill="none" opacity="0.5"/>
          <circle cx="365" cy="10" r="3" fill="#7B1E3A" opacity="0.4"/>
          <line x1="380" y1="10" x2="600" y2="10" stroke="#F7C8D0" stroke-width="1"/>
        </svg>
      </div>

      <!-- Empty state (shown when no items) -->
      <div class="wl-empty" id="wlEmpty" hidden>
        <span class="wl-empty-icon">♡</span>
        <h2>Nothing saved yet</h2>
        <p>Tap the ♡ on any item in the collections to save it here.</p>
        <a href="index.html#collections" class="btn btn-primary">Browse Collections</a>
      </div>

      <!-- Count + clear bar -->
      <div class="wl-count-bar" id="wlCountBar" hidden>
        <span class="wl-count-label" id="wlCountLabel">0 items saved</span>
        <div class="wl-actions-group">
          <button class="wl-share-all-btn" id="wlShareAllBtn" aria-label="Share my wishlist">
            <span aria-hidden="true">↗</span> Share Wishlist
          </button>
          <button class="wl-clear-btn" id="wlClearBtn">Clear all</button>
        </div>
      </div>

      <!-- Items grid -->
      <div class="wl-grid" id="wlGrid"></div>

    </div>
  </main>

  <!-- Toast for share/copy feedback -->
  <div class="wl-toast" id="wlToast" role="status" aria-live="polite"></div>


  <script>
    /* ── Navbar scroll ── */
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 20);
    }, { passive: true });

    /* ── Hamburger ── */
    const hamburger = document.getElementById('hamburger');
    const navLinks  = document.getElementById('navLinks');
    hamburger.addEventListener('click', () => {
      const open = hamburger.classList.toggle('open');
      navLinks.classList.toggle('open', open);
      hamburger.setAttribute('aria-expanded', String(open));
    });
    document.addEventListener('click', e => {
      if (!navbar.contains(e.target)) {
        hamburger.classList.remove('open');
        navLinks.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
      }
    });

    /* ── Wishlist ── */
    const STORAGE_KEY = 'sajghor_wishlist';

    function getWishlist() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function saveWishlist(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    const grid       = document.getElementById('wlGrid');
    const emptyEl    = document.getElementById('wlEmpty');
    const countBar   = document.getElementById('wlCountBar');
    const countLabel = document.getElementById('wlCountLabel');
    const clearBtn   = document.getElementById('wlClearBtn');
    const shareAllBtn = document.getElementById('wlShareAllBtn');
    const countBadge = document.getElementById('wishlistCount');
    const toastEl    = document.getElementById('wlToast');

    /* ── Toast feedback ── */
    let toastTimer;
    function showToast(message) {
      clearTimeout(toastTimer);
      toastEl.textContent = message;
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
    }

    /* ── Share a single wishlist item ── */
    async function shareItem(item) {
      const absoluteUrl = new URL(item.img, window.location.href).href;
      const shareData = {
        title: `${item.name} – Ruma's Sajghor`,
        text: `Check out ${item.name} (${item.price}) at Ruma's Sajghor – Dress Your Story!`,
        url: absoluteUrl,
      };

      if (navigator.share) {
        try { await navigator.share(shareData); }
        catch { /* user cancelled – silently ignore */ }
      } else {
        const text = `${shareData.title}\n${shareData.text}\n${shareData.url}`;
        try {
          await navigator.clipboard.writeText(text);
          showToast('Link copied to clipboard!');
        } catch {
          alert(`Share this item:\n\n${text}`);
        }
      }
    }

    /* ── Share the entire wishlist ── */
    async function shareWishlist() {
      const list = getWishlist();
      if (!list.length) return;

      const lines = list.map(item => `• ${item.name} – ${item.price}`).join('\n');
      const shareText = `My Wishlist from Ruma's Sajghor 💖\n\n${lines}\n\nDress Your Story ✨\n${window.location.origin}${window.location.pathname.replace('wishlist.html', 'index.html#collections')}`;

      const shareData = {
        title: `My Wishlist – Ruma's Sajghor`,
        text: shareText,
      };

      if (navigator.share) {
        try { await navigator.share(shareData); }
        catch { /* user cancelled – silently ignore */ }
      } else {
        try {
          await navigator.clipboard.writeText(shareText);
          showToast('Wishlist copied to clipboard!');
        } catch {
          alert(`Share your wishlist:\n\n${shareText}`);
        }
      }
    }

    function render() {
      const list = getWishlist();
      grid.innerHTML = '';

      // Nav badge
      if (list.length > 0) {
        countBadge.textContent = list.length;
        countBadge.removeAttribute('hidden');
      } else {
        countBadge.setAttribute('hidden', '');
      }

      if (list.length === 0) {
        emptyEl.removeAttribute('hidden');
        countBar.setAttribute('hidden', '');
        return;
      }

      emptyEl.setAttribute('hidden', '');
      countBar.removeAttribute('hidden');
      countLabel.textContent = `${list.length} item${list.length !== 1 ? 's' : ''} saved`;

      list.forEach(item => {
        const card = document.createElement('div');
        card.className = 'wl-card';
        card.innerHTML = `
          <img class="wl-card-img" src="${item.img}" alt="${item.name}"
               onerror="this.style.background='var(--clr-grey-lt)';this.removeAttribute('src')" />
          <button class="wl-share-btn" aria-label="Share ${item.name}" data-name="${item.name}">↗</button>
          <button class="wl-remove-btn" aria-label="Remove ${item.name} from wishlist" data-name="${item.name}">✕</button>
          <div class="wl-card-body">
            <p class="wl-card-name">${item.name}</p>
            <p class="wl-card-price">${item.price}</p>
            <a href="index.html#collections" class="btn btn-outline" style="width:100%;text-align:center;display:block">View in Store</a>
          </div>
        `;
        card.querySelector('.wl-remove-btn').addEventListener('click', () => {
          let l = getWishlist().filter(i => i.name !== item.name);
          saveWishlist(l);
          render();
        });
        card.querySelector('.wl-share-btn').addEventListener('click', () => shareItem(item));
        grid.appendChild(card);
      });
    }

    clearBtn.addEventListener('click', () => {
      if (confirm('Remove all items from your wishlist?')) {
        saveWishlist([]);
        render();
      }
    });

    shareAllBtn.addEventListener('click', shareWishlist);

    render();
  </script>
</body>
</html>
